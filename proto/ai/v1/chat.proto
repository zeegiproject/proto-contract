syntax = "proto3";
package ai.v1;

service AIService {
  rpc Chat(ChatRequest) returns (stream ChatChunk);
  rpc GetTopicPlan(TopicPlanRequest) returns (TopicPlanResponse);
  rpc GetLesson(LessonRequest) returns (LessonResponse);
  rpc GetSyllabus(SyllabusRequest) returns (SyllabusResponse);
}

message TopicPlanRequest {
  string topic = 1;
  string language = 2;
}

message TopicSection {
  string title = 1;
  string description = 2;
}

message TopicPlanResponse {
  repeated TopicSection sections = 1;
  string topic = 2;
  string subject = 3;
}

message LessonRequest {
  string topic = 1;
  string subject = 2;
  int32 section_index = 3;
  string section_title = 4;
}

message LessonSlide {
  string type = 1;
  string content_json = 2;
  string audio_script = 3;
}

message LessonResponse {
  string section_title = 1;
  string subject = 2;
  string topic = 3;
  int32 section_index = 4;
  repeated LessonSlide slides = 5;
  string challenge_json = 6;
}

message SyllabusRequest {
  string subject = 1;
}

message SyllabusTopic {
  string name = 1;
  repeated string subtopics = 2;
}

message SyllabusResponse {
  string subject = 1;
  repeated SyllabusTopic topics = 2;
}

message ChatRequest {
  string session_id = 1;
  string prompt = 2;
  string context = 3;
  string subject = 4;
}

message ChatChunk {
  string token = 1;
  bool is_final = 2;
  string next_action = 3; // memo | challenge_2 | challenge_3 | retake | continue
}
