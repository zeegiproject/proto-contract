syntax = "proto3";

package ai.v1;

// The AI Service handles all real-time educational interactions.
service AIService {
  // Streams tokens back to the client for a "typing" effect.
  rpc Chat(ChatRequest) returns (stream ChatChunk);

  // New method for topic planning
  rpc GetTopicPlan(TopicPlanRequest) returns (TopicPlanResponse);
}

message TopicPlanRequest {
  string topic = 1;      // e.g., "Figures of Speech"
  string language = 2;   // optional, e.g., "English"
}

message TopicSection {
  string title = 1;       // e.g., "Nouns"
  string description = 2; // Brief overview of what this section covers
}

message TopicPlanResponse {
  string topic = 1;
  repeated TopicSection sections = 2; // The structured list of sections
}

message ChatRequest {
  string session_id = 1;
  string prompt = 2;
  string context = 3; // JSON or serialized history/vector context
}

message ChatChunk {
  string token = 1;
  bool is_final = 2;
}
