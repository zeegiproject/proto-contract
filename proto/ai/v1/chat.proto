syntax = "proto3";
package ai.v1;

service AIService {
  rpc Chat(ChatRequest) returns (stream ChatChunk);
  rpc GetTopicPlan(TopicPlanRequest) returns (TopicPlanResponse);
}

message TopicPlanRequest {
  string topic = 1;
  string language = 2;
}

message TopicSection {
  string title = 1;
  string description = 2;
}

message TopicPlanResponse {
  repeated TopicSection sections = 1;
  string topic = 2;
  string subject = 3;
}

message ChatRequest {
  string session_id = 1;
  string prompt = 2;
  string context = 3;
  string subject = 4;
}

message ChatChunk {
  string token = 1;
  bool is_final = 2;
}
